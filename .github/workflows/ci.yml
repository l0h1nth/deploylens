name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  analyze-deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check deploylens tests

      - name: Test
        run: pytest

      - name: Validate dev Kubernetes manifests
        run: python -m deploylens validate manifests/dev --json-output reports/deploylens-dev-validation.json

      - name: Validate prod Kubernetes manifests
        run: python -m deploylens validate manifests/prod --json-output reports/deploylens-prod-validation.json

      - name: Build sample app image
        run: docker build -t deploylens-sample:${{ github.sha }} sample-app

      - name: Generate dev DeployLens report
        run: python -m deploylens scan manifests/dev --environment dev --policy .deploylens.yml --output reports/deploylens-dev-report.md --json-output reports/deploylens-dev-report.json

      - name: Generate prod DeployLens report
        run: python -m deploylens scan manifests/prod --environment prod --policy .deploylens.yml --output reports/deploylens-prod-report.md --json-output reports/deploylens-prod-report.json

      - name: Add reports to job summary
        run: |
          cat reports/deploylens-dev-report.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n---\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat reports/deploylens-prod-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment DeployLens report on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- deploylens-risk-report -->';
            const devReport = fs.readFileSync('reports/deploylens-dev-report.md', 'utf8');
            const prodReport = fs.readFileSync('reports/deploylens-prod-report.md', 'utf8');

            const body = [
              marker,
              '## DeployLens CI Report',
              '',
              'Deployment risk analysis completed for this pull request.',
              '',
              '<details>',
              '<summary>Dev report</summary>',
              '',
              devReport,
              '',
              '</details>',
              '',
              '<details>',
              '<summary>Prod report</summary>',
              '',
              prodReport,
              '',
              '</details>',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.data.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload DeployLens report
        uses: actions/upload-artifact@v4
        with:
          name: deploylens-risk-report
          path: |
            reports/deploylens-dev-report.md
            reports/deploylens-dev-report.json
            reports/deploylens-dev-validation.json
            reports/deploylens-prod-report.md
            reports/deploylens-prod-report.json
            reports/deploylens-prod-validation.json

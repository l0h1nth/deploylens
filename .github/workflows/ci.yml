name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  analyze-deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check deploylens tests

      - name: Test
        run: pytest

      - name: Validate dev Kubernetes manifests
        run: python -m deploylens validate manifests/dev --json-output reports/deploylens-dev-validation.json

      - name: Validate prod Kubernetes manifests
        run: python -m deploylens validate manifests/prod --json-output reports/deploylens-prod-validation.json

      - name: Build sample app image
        run: docker build -t deploylens-sample:${{ github.sha }} sample-app

      - name: Generate dev DeployLens report
        run: python -m deploylens scan manifests/dev --environment dev --output reports/deploylens-dev-report.md --json-output reports/deploylens-dev-report.json --fail-threshold 101

      - name: Generate prod DeployLens report
        run: python -m deploylens scan manifests/prod --environment prod --output reports/deploylens-prod-report.md --json-output reports/deploylens-prod-report.json --fail-threshold 80

      - name: Add reports to job summary
        run: |
          cat reports/deploylens-dev-report.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n---\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat reports/deploylens-prod-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload DeployLens report
        uses: actions/upload-artifact@v4
        with:
          name: deploylens-risk-report
          path: |
            reports/deploylens-dev-report.md
            reports/deploylens-dev-report.json
            reports/deploylens-dev-validation.json
            reports/deploylens-prod-report.md
            reports/deploylens-prod-report.json
            reports/deploylens-prod-validation.json

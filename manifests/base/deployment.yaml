apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploylens-sample
  namespace: deploylens
  labels:
    app.kubernetes.io/name: deploylens-sample
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deploylens-sample
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deploylens-sample
    spec:
      containers:
        - name: web
          image: deploylens-sample:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
